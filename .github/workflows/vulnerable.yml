name: Vulnerable — Multi-Phase Secret Leak PoC

# INTENTIONALLY VULNERABLE. Do not copy this pattern to real repos.
#
# This workflow demonstrates the "pwn request" pattern:
#   - pull_request_target trigger (runs in the base repo's context, with secrets)
#   - Checks out the PR's merge ref into ./pr/ as a sibling of ./base/
#   - Runs `npm install` on PR code — executes attacker-controlled postinstall
#   - Later steps inject different secrets into env and run scripts from ./base/
#
# The checkouts share a workspace, so any RCE in the npm install step can
# rewrite files in ./base/ to hijack later, secret-bearing steps.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Checkout PR merge ref
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          path: pr

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ─────────────────────────────────────────────────────────────
      # PHASE 1 — `npm install` on PR code. No repo secrets in env.
      # Attacker-controlled code (postinstall/prepare hooks) runs here.
      # Env available: ambient runner vars only (ACTIONS_RUNTIME_TOKEN,
      # GITHUB_REPOSITORY, RUNNER_*, etc.) — NO repo secrets.
      # ─────────────────────────────────────────────────────────────
      - name: Phase 1 — Build PR (attacker code fires here)
        run: |
          echo "=== PHASE 1 — no repo secrets in env ==="
          cd pr
          npm install
          npm run build --if-present

      # ─────────────────────────────────────────────────────────────
      # PHASE 2 — FAKE_PHASE2_TOKEN enters env. Runs base/scripts/phase2.
      # To steal this secret, Phase 1 must have overwritten
      # base/scripts/phase2-analyze.mjs.
      # ─────────────────────────────────────────────────────────────
      - name: Phase 2 — Analyze (FAKE_PHASE2_TOKEN in env)
        env:
          FAKE_PHASE2_TOKEN: ${{ secrets.FAKE_PHASE2_TOKEN }}
        run: |
          echo "=== PHASE 2 — FAKE_PHASE2_TOKEN in env ==="
          node base/scripts/phase2-analyze.mjs

      # ─────────────────────────────────────────────────────────────
      # PHASE 3 — FAKE_PHASE3_KEY enters env. Runs base/scripts/phase3.
      # To steal this secret, Phase 1 must have overwritten
      # base/scripts/phase3-publish.mjs.
      # Note: FAKE_PHASE2_TOKEN is NOT in env here — secrets are per-step.
      # ─────────────────────────────────────────────────────────────
      - name: Phase 3 — Publish (FAKE_PHASE3_KEY in env)
        env:
          FAKE_PHASE3_KEY: ${{ secrets.FAKE_PHASE3_KEY }}
        run: |
          echo "=== PHASE 3 — FAKE_PHASE3_KEY in env ==="
          node base/scripts/phase3-publish.mjs
